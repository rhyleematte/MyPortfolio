<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Advanced Task Manager</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="container">
  
  <header>
      <h1>📝 Task Manager</h1>
      <p>Stay organized and productive!</p>
      <button id="themeToggle" class="theme-toggle" title="Toggle Dark Mode">🌙</button>
  </header>

  <!-- Input Section -->
  <section class="task-input-section">
      <div class="input-group">
          <input type="text" id="taskInput" placeholder="Enter a new task..." maxlength="100" />
          <button id="addTaskBtn" aria-label="Add Task">
              <span>Add Task</span>
              <span>+</span>
          </button>
      </div>
  </section>

  <!-- Stats -->
  <section class="task-stats" aria-label="Task statistics">
      <div class="stat">
          <span id="totalTasks" class="stat-number">0</span>
          <span class="stat-label">Total</span>
      </div>
      <div class="stat">
          <span id="completedTasks" class="stat-number">0</span>
          <span class="stat-label">Completed</span>
      </div>
      <div class="stat">
          <span id="pendingTasks" class="stat-number">0</span>
          <span class="stat-label">Pending</span>
      </div>
  </section>

  <hr />

  <!-- Filter Buttons -->
  <section class="filter-section" role="group" aria-label="Filter tasks">
      <button class="filter-btn active" data-filter="all" aria-pressed="true">All</button>
      <button class="filter-btn" data-filter="pending" aria-pressed="false">Pending</button>
      <button class="filter-btn" data-filter="completed" aria-pressed="false">Completed</button>
  </section>

  <!-- Tasks -->
  <section class="tasks-container" aria-live="polite" aria-relevant="additions removals">
      <ul id="tasksList" class="tasks-list" role="list"></ul>

      <div id="emptyState" class="empty-state" role="alert" aria-live="assertive">
          <div class="empty-icon" aria-hidden="true">📋</div>
          <h3>No tasks yet</h3>
          <p>Add your first task to get started!</p>
      </div>
  </section>

  <!-- Clear -->
  <section class="actions-section">
      <button id="clearCompletedBtn" class="clear-btn" disabled>
          Clear Completed
      </button>
  </section>

</div>

<!-- Toast -->
<div id="toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">Task Added ✅</div>

<script src="script.js"></script>
</body>
</html>
